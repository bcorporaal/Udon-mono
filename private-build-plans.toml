[buildPlans.UdonMono.weights.Thin]
shape = 100
menu = 100
css = 100

# [buildPlans.UdonMono.weights.ExtraLight]
# shape = 200
# menu = 200
# css = 200

[buildPlans.UdonMono.weights.Light]
